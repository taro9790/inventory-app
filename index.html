<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おむつ在庫・使用枚数管理</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f3;
      color: #17211a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f7f3;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      margin-bottom: 18px;
      padding: 18px 0 4px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(1.55rem, 4vw, 2.25rem);
      line-height: 1.2;
    }

    h2 { font-size: 1.15rem; margin-bottom: 12px; }
    h3 { font-size: 1.08rem; }

    p, li { line-height: 1.65; }

    .lead {
      color: #4b5b52;
      margin-top: 8px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(20, 38, 25, 0.06);
    }

    .tab-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .tab-button {
      background: #ffffff;
      color: #24352b;
      border-color: #c8d0c6;
    }

    .tab-button.active {
      background: #1f6f54;
      color: #ffffff;
      border-color: #1f6f54;
    }

    .view[hidden] {
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.93rem;
      color: #34433a;
    }

    input, select, textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #c8d0c6;
      border-radius: 8px;
      background: #ffffff;
      color: #17211a;
      font: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 82px;
    }

    .full-span { grid-column: 1 / -1; }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: #1f6f54;
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .secondary-button {
      background: #ffffff;
      color: #24352b;
      border-color: #c8d0c6;
    }

    .danger-button {
      background: #ffffff;
      color: #9f1d1d;
      border-color: #e6b8b8;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      background: #eef3ec;
      border: 1px solid #d5ded2;
      border-radius: 8px;
      padding: 14px;
    }

    .summary-card strong {
      display: block;
      font-size: 1.65rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .summary-card span {
      color: #526159;
      font-size: 0.9rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(160px, 0.6fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-card {
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .record-card.found {
      border-color: #1f6f54;
      box-shadow: 0 0 0 3px rgba(31, 111, 84, 0.16);
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .record-meta {
      color: #526159;
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .stat {
      background: #f4f6f2;
      border-radius: 8px;
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
    }

    .stat span {
      display: block;
      color: #5c685f;
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .record-actions {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .qr-section {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .qr-box {
      max-width: 190px;
      margin-bottom: 8px;
    }

    .qr-box canvas {
      width: 100%;
      height: auto;
      background: #ffffff;
      border-radius: 8px;
    }

    .scanner-panel video {
      width: 100%;
      min-height: 220px;
      margin-top: 12px;
      border-radius: 8px;
      background: #111827;
      object-fit: cover;
    }

    .scan-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-result, .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .work-card {
      margin-top: 12px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #d9ded7;
      background: #ffffff;
    }

    .quantity-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .status.success { border-color: #77ad88; color: #174c2b; }
    .status.error { border-color: #de9898; color: #8c1d1d; }
    .status.warning { border-color: #e2c06c; color: #704c00; }

    .empty {
      color: #526159;
      padding: 14px 0;
    }

    @media (max-width: 760px) {
      .form-grid, .summary-grid, .toolbar, .stats-row, .record-actions, .quantity-row {
        grid-template-columns: 1fr;
      }

      .button-row button, .scan-controls button, .record-actions button, .tab-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>おむつ在庫・使用枚数管理</h1>
      <p class="lead">介護施設の利用者さんごとに、おむつ類の現在庫・使用枚数・ご家族への請求予定額を確認できます。</p>
    </header>

    <nav class="tab-row" aria-label="画面切り替え">
      <button type="button" class="tab-button active" data-view="work-view">作業する</button>
      <button type="button" class="tab-button" data-view="admin-view">登録・管理</button>
    </nav>

    <div id="work-view" class="view">
      <section class="panel scanner-panel">
        <h2>作業する</h2>
        <p class="lead">QRや管理コードで用品を呼び出して、使用枚数を選びます。</p>
        <div class="scan-controls">
          <button id="start-scan">スキャン開始</button>
          <button id="stop-scan" class="secondary-button" disabled>停止</button>
        </div>
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-result">
          <strong>読み取り結果:</strong>
          <span id="scan-output">なし</span>
        </div>
        <div class="button-row">
          <input type="text" id="manual-code" placeholder="管理コードを手入力" />
          <button id="manual-lookup" class="secondary-button">検索</button>
        </div>
        <div id="work-record-preview" class="work-card">
          <p class="empty">QRを読み取るか、管理コードを入力してください。</p>
        </div>
        <div id="status-message" class="status">準備完了</div>
      </section>
    </div>

    <div id="admin-view" class="view" hidden>
      <section class="panel">
        <h2>利用者登録</h2>
        <form id="resident-form">
          <div class="form-grid">
            <label>利用者名
              <input type="text" id="master-resident-name" placeholder="例：山田 花子" required />
            </label>
          </div>
          <div class="button-row">
            <button type="submit">利用者を追加</button>
          </div>
        </form>
        <div id="resident-master-list" class="record-list"></div>
      </section>

      <section class="panel">
        <h2>用品登録</h2>
        <form id="product-form">
          <div class="form-grid">
            <label>用品種別
              <select id="master-product-type">
                <option value="テープ式おむつ">テープ式おむつ</option>
                <option value="パンツ式おむつ">パンツ式おむつ</option>
                <option value="尿取りパッド">尿取りパッド</option>
                <option value="フラットタイプ">フラットタイプ</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>サイズ・商品名
              <input type="text" id="master-product-name" placeholder="例：Mサイズ / 夜用パッド" required />
            </label>
            <label>1枚あたり単価
              <input type="number" id="master-product-price" value="0" min="0" step="1" />
            </label>
          </div>
          <div class="button-row">
            <button type="submit">用品を追加</button>
          </div>
        </form>
        <div id="product-master-list" class="record-list"></div>
      </section>

      <section class="panel">
        <h2>利用者に用品を割り当て</h2>
        <form id="record-form">
          <div class="form-grid">
            <label>利用者名
              <input type="text" id="resident-name" list="resident-options" placeholder="例：山田 花子" required />
              <datalist id="resident-options"></datalist>
            </label>
            <label>用品種別
              <select id="item-type">
                <option value="テープ式おむつ">テープ式おむつ</option>
                <option value="パンツ式おむつ">パンツ式おむつ</option>
                <option value="尿取りパッド">尿取りパッド</option>
                <option value="フラットタイプ">フラットタイプ</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>サイズ・商品名
              <input type="text" id="item-detail" list="product-options" placeholder="例：Mサイズ / 夜用パッド" />
              <datalist id="product-options"></datalist>
            </label>
            <label>管理コード
              <input type="text" id="item-code" placeholder="自動生成できます" />
            </label>
            <label>現在庫
              <input type="number" id="stock-count" value="0" min="0" required />
            </label>
            <label>今月の使用枚数
              <input type="number" id="used-count" value="0" min="0" required />
            </label>
            <label>1枚あたり単価
              <input type="number" id="unit-price" value="0" min="0" step="1" />
            </label>
            <label class="full-span">メモ
              <textarea id="memo" placeholder="例：ご家族持ち込み、施設購入、次回補充予定など"></textarea>
            </label>
          </div>
          <div class="button-row">
            <button type="button" id="scan-code-for-form" class="secondary-button">バーコード/QR読取</button>
            <button type="button" id="generate-code" class="secondary-button">管理コード生成</button>
            <button type="submit" id="submit-record">登録する</button>
            <button type="button" id="cancel-edit" class="secondary-button" hidden>編集をやめる</button>
          </div>
          <div id="form-scan-panel" class="scanner-panel" hidden>
            <video id="form-video" autoplay muted playsinline></video>
            <div class="button-row">
              <button type="button" id="stop-form-scan" class="secondary-button">読取を停止</button>
            </div>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>集計</h2>
        <div class="summary-grid">
          <div class="summary-card">
            <strong id="total-residents">0</strong>
            <span>利用者数</span>
          </div>
          <div class="summary-card">
            <strong id="total-records">0</strong>
            <span>登録用品</span>
          </div>
          <div class="summary-card">
            <strong id="total-used">0</strong>
            <span>今月の使用枚数</span>
          </div>
          <div class="summary-card">
            <strong id="total-billing">0円</strong>
            <span>請求予定額</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>利用者別一覧</h2>
        <div class="toolbar">
          <input type="text" id="search-input" placeholder="利用者名・用品・管理コードで検索" />
          <select id="sort-select">
            <option value="resident">利用者名順</option>
            <option value="low-stock">在庫が少ない順</option>
            <option value="billing">請求額が高い順</option>
            <option value="updated">更新が新しい順</option>
          </select>
        </div>
        <div id="record-list" class="record-list"></div>
      </section>
    </div>
  </main>

  <script src="jsQR.js"></script>
  <script src="qrcode.min.js"></script>
  <script>
    const STORAGE_KEY = 'care-diaper-records-v1';
    const RESIDENTS_KEY = 'care-diaper-residents-v1';
    const PRODUCTS_KEY = 'care-diaper-products-v1';

    const residentForm = document.getElementById('resident-form');
    const masterResidentNameInput = document.getElementById('master-resident-name');
    const residentMasterList = document.getElementById('resident-master-list');
    const residentOptions = document.getElementById('resident-options');
    const productForm = document.getElementById('product-form');
    const masterProductTypeInput = document.getElementById('master-product-type');
    const masterProductNameInput = document.getElementById('master-product-name');
    const masterProductPriceInput = document.getElementById('master-product-price');
    const productMasterList = document.getElementById('product-master-list');
    const productOptions = document.getElementById('product-options');
    const recordForm = document.getElementById('record-form');
    const residentNameInput = document.getElementById('resident-name');
    const itemTypeInput = document.getElementById('item-type');
    const itemDetailInput = document.getElementById('item-detail');
    const itemCodeInput = document.getElementById('item-code');
    const stockCountInput = document.getElementById('stock-count');
    const usedCountInput = document.getElementById('used-count');
    const unitPriceInput = document.getElementById('unit-price');
    const memoInput = document.getElementById('memo');
    const scanCodeForFormButton = document.getElementById('scan-code-for-form');
    const generateCodeButton = document.getElementById('generate-code');
    const submitRecordButton = document.getElementById('submit-record');
    const cancelEditButton = document.getElementById('cancel-edit');
    const totalResidents = document.getElementById('total-residents');
    const totalRecords = document.getElementById('total-records');
    const totalUsed = document.getElementById('total-used');
    const totalBilling = document.getElementById('total-billing');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort-select');
    const recordList = document.getElementById('record-list');
    const startScanButton = document.getElementById('start-scan');
    const stopScanButton = document.getElementById('stop-scan');
    const video = document.getElementById('video');
    const scanOutput = document.getElementById('scan-output');
    const manualCodeInput = document.getElementById('manual-code');
    const manualLookupButton = document.getElementById('manual-lookup');
    const statusMessage = document.getElementById('status-message');
    const formScanPanel = document.getElementById('form-scan-panel');
    const formVideo = document.getElementById('form-video');
    const stopFormScanButton = document.getElementById('stop-form-scan');
    const workRecordPreview = document.getElementById('work-record-preview');
    const tabButtons = document.querySelectorAll('.tab-button');
    const views = document.querySelectorAll('.view');

    let records = [];
    let residents = [];
    let products = [];
    let currentStream = null;
    let scanning = false;
    let scanCanvas = null;
    let scanContext = null;
    let lastScannedCode = '';
    let activeWorkRecordId = '';
    let editingRecordId = '';
    let scannerMode = 'work';
    let barcodeDetector = null;
    let activeVideo = video;

    function yen(value) {
      return `${Number(value || 0).toLocaleString('ja-JP')}円`;
    }

    function setStatus(text, type = 'info') {
      statusMessage.textContent = text;
      statusMessage.className = `status ${type}`;
    }

    function loadRecords() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        records = [];
      } else {
        try {
          records = JSON.parse(stored);
        } catch (error) {
          records = [];
        }
      }

      const storedResidents = localStorage.getItem(RESIDENTS_KEY);
      const storedProducts = localStorage.getItem(PRODUCTS_KEY);
      try {
        residents = storedResidents ? JSON.parse(storedResidents) : [];
      } catch (error) {
        residents = [];
      }
      try {
        products = storedProducts ? JSON.parse(storedProducts) : [];
      } catch (error) {
        products = [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function saveResidents() {
      localStorage.setItem(RESIDENTS_KEY, JSON.stringify(residents));
    }

    function saveProducts() {
      localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function generateCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      const body = Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      return `OM-${body}`;
    }

    function getBilling(record) {
      return Number(record.usedCount || 0) * Number(record.unitPrice || 0);
    }

    function updateSummary() {
      const residents = new Set(records.map((record) => record.residentName.trim()).filter(Boolean));
      const used = records.reduce((sum, record) => sum + Number(record.usedCount || 0), 0);
      const billing = records.reduce((sum, record) => sum + getBilling(record), 0);

      totalResidents.textContent = residents.size;
      totalRecords.textContent = records.length;
      totalUsed.textContent = used;
      totalBilling.textContent = yen(billing);
    }

    function getVisibleRecords() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = records.filter((record) => {
        const text = [
          record.residentName,
          record.itemType,
          record.itemDetail,
          record.code,
          record.memo,
        ].join(' ').toLowerCase();
        return !query || text.includes(query);
      });

      return filtered.sort((a, b) => {
        if (sortSelect.value === 'low-stock') {
          return Number(a.stockCount || 0) - Number(b.stockCount || 0);
        }
        if (sortSelect.value === 'billing') {
          return getBilling(b) - getBilling(a);
        }
        if (sortSelect.value === 'updated') {
          return new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt);
        }
        return a.residentName.localeCompare(b.residentName, 'ja');
      });
    }

    function renderResidents() {
      residentOptions.innerHTML = residents.map((resident) => `<option value="${escapeHtml(resident.name)}"></option>`).join('');
      residentMasterList.innerHTML = residents.length
        ? residents.map((resident) => `<article class="record-card"><h3>${escapeHtml(resident.name)}</h3></article>`).join('')
        : '<p class="empty">まだ利用者さんが登録されていません。</p>';
    }

    function renderProducts() {
      productOptions.innerHTML = products.map((product) => `<option value="${escapeHtml(product.name)}"></option>`).join('');
      productMasterList.innerHTML = products.length
        ? products.map((product) => `
          <article class="record-card">
            <h3>${escapeHtml(product.name)}</h3>
            <p class="record-meta">${escapeHtml(product.type)} / ${yen(product.price)}</p>
          </article>
        `).join('')
        : '<p class="empty">まだ用品が登録されていません。</p>';
    }

    function renderRecords() {
      recordList.innerHTML = '';
      const visibleRecords = getVisibleRecords();

      if (visibleRecords.length === 0) {
        recordList.innerHTML = '<p class="empty">表示する登録がありません。</p>';
        updateSummary();
        return;
      }

      visibleRecords.forEach((record) => {
        const card = document.createElement('article');
        card.className = 'record-card';
        card.dataset.id = record.id;
        card.innerHTML = `
          <div class="record-header">
            <div>
              <h3>${escapeHtml(record.residentName)}</h3>
              <p class="record-meta">${escapeHtml(record.itemType)} ${escapeHtml(record.itemDetail)}<br>管理コード: ${escapeHtml(record.code)}</p>
            </div>
            <div class="record-meta">更新: ${new Date(record.updatedAt || record.createdAt).toLocaleString('ja-JP')}</div>
          </div>
          <div class="stats-row">
            <div class="stat"><strong>${Number(record.stockCount || 0)}</strong><span>現在庫</span></div>
            <div class="stat"><strong>${Number(record.usedCount || 0)}</strong><span>今月使用</span></div>
            <div class="stat"><strong>${yen(record.unitPrice)}</strong><span>1枚単価</span></div>
            <div class="stat"><strong>${yen(getBilling(record))}</strong><span>請求予定</span></div>
          </div>
          ${record.memo ? `<p class="record-meta">メモ: ${escapeHtml(record.memo)}</p>` : ''}
          <div class="record-actions">
            <button type="button" data-action="edit" data-id="${record.id}" class="secondary-button">編集</button>
            <button type="button" data-action="use" data-id="${record.id}">使用 +1</button>
            <button type="button" data-action="undo-use" data-id="${record.id}" class="secondary-button">使用取消</button>
            <button type="button" data-action="restock-one" data-id="${record.id}" class="secondary-button">入庫 +1</button>
            <button type="button" data-action="restock-pack" data-id="${record.id}" class="secondary-button">入庫 +10</button>
            <button type="button" data-action="toggle-qr" data-id="${record.id}" class="secondary-button">QR表示</button>
            <button type="button" data-action="delete" data-id="${record.id}" class="danger-button">削除</button>
          </div>
          <div class="qr-section" hidden>
            <div class="qr-box">
              <canvas class="qr-canvas" width="180" height="180"></canvas>
            </div>
            <p class="record-meta">管理コード: ${escapeHtml(record.code)}</p>
          </div>
        `;
        card.querySelector('.record-actions').addEventListener('click', handleRecordAction);
        recordList.appendChild(card);
      });

      updateSummary();
    }

    function renderWorkRecord(record) {
      if (!record) {
        workRecordPreview.innerHTML = '<p class="empty">QRを読み取るか、管理コードを入力してください。</p>';
        activeWorkRecordId = '';
        return;
      }

      activeWorkRecordId = record.id;
      workRecordPreview.innerHTML = `
        <h3>${escapeHtml(record.residentName)}</h3>
        <p class="record-meta">${escapeHtml(record.itemType)} ${escapeHtml(record.itemDetail)}<br>管理コード: ${escapeHtml(record.code)}</p>
        <div class="stats-row">
          <div class="stat"><strong>${Number(record.stockCount || 0)}</strong><span>現在庫</span></div>
          <div class="stat"><strong>${Number(record.usedCount || 0)}</strong><span>今月使用</span></div>
          <div class="stat"><strong>${yen(record.unitPrice)}</strong><span>1枚単価</span></div>
          <div class="stat"><strong>${yen(getBilling(record))}</strong><span>請求予定</span></div>
        </div>
        <div class="quantity-row">
          <button type="button" data-use-count="1">1枚使用</button>
          <button type="button" data-use-count="2">2枚使用</button>
          <button type="button" data-use-count="3">3枚使用</button>
          <button type="button" data-use-count="4">4枚使用</button>
        </div>
      `;
    }

    function touch(record) {
      record.updatedAt = new Date().toISOString();
    }

    function handleRecordAction(event) {
      const button = event.target.closest('button');
      if (!button) return;

      const record = records.find((entry) => entry.id === button.dataset.id);
      if (!record) return;

      if (button.dataset.action === 'edit') {
        startEditRecord(record);
        return;
      }

      if (button.dataset.action === 'use') {
        if (Number(record.stockCount || 0) <= 0) {
          setStatus('在庫が0のため、使用登録できません。先に入庫してください。', 'warning');
          return;
        }
        record.stockCount = Number(record.stockCount || 0) - 1;
        record.usedCount = Number(record.usedCount || 0) + 1;
        touch(record);
        setStatus(`${record.residentName}さんの使用を1枚登録しました。`, 'success');
      }

      if (button.dataset.action === 'undo-use') {
        if (Number(record.usedCount || 0) <= 0) {
          setStatus('取り消せる使用枚数がありません。', 'warning');
          return;
        }
        record.usedCount = Number(record.usedCount || 0) - 1;
        record.stockCount = Number(record.stockCount || 0) + 1;
        touch(record);
        setStatus('直近分として1枚戻しました。', 'success');
      }

      if (button.dataset.action === 'restock-one') {
        record.stockCount = Number(record.stockCount || 0) + 1;
        touch(record);
        setStatus('在庫を1枚追加しました。', 'success');
      }

      if (button.dataset.action === 'restock-pack') {
        record.stockCount = Number(record.stockCount || 0) + 10;
        touch(record);
        setStatus('在庫を10枚追加しました。', 'success');
      }

      if (button.dataset.action === 'delete') {
        if (!confirm(`${record.residentName}さんの「${record.itemType}」を削除しますか？`)) return;
        records = records.filter((entry) => entry.id !== record.id);
        setStatus('登録を削除しました。', 'success');
      }

      if (button.dataset.action === 'toggle-qr') {
        const card = button.closest('.record-card');
        toggleQRCode(card, record);
        return;
      }

      saveRecords();
      renderRecords();
    }

    function startEditRecord(record) {
      editingRecordId = record.id;
      residentNameInput.value = record.residentName;
      itemTypeInput.value = record.itemType;
      itemDetailInput.value = record.itemDetail || '';
      itemCodeInput.value = record.code;
      stockCountInput.value = Number(record.stockCount || 0);
      usedCountInput.value = Number(record.usedCount || 0);
      unitPriceInput.value = Number(record.unitPrice || 0);
      memoInput.value = record.memo || '';
      submitRecordButton.textContent = '編集を保存';
      cancelEditButton.hidden = false;
      switchView('admin-view');
      recordForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setStatus('編集内容を入力して保存してください。', 'info');
    }

    function cancelEdit() {
      editingRecordId = '';
      recordForm.reset();
      stockCountInput.value = 0;
      usedCountInput.value = 0;
      unitPriceInput.value = 0;
      submitRecordButton.textContent = '登録する';
      cancelEditButton.hidden = true;
    }

    function registerUseCount(count) {
      const record = records.find((entry) => entry.id === activeWorkRecordId);
      if (!record) {
        setStatus('先にQRか管理コードで用品を選んでください。', 'warning');
        return;
      }

      if (Number(record.stockCount || 0) < count) {
        setStatus('在庫数より多い枚数は登録できません。', 'warning');
        return;
      }

      record.stockCount = Number(record.stockCount || 0) - count;
      record.usedCount = Number(record.usedCount || 0) + count;
      touch(record);
      saveRecords();
      renderRecords();
      renderWorkRecord(record);
      setStatus(`${record.residentName}さんの使用を${count}枚登録しました。`, 'success');
    }

    function handleResidentSubmit(event) {
      event.preventDefault();
      const name = masterResidentNameInput.value.trim();
      if (!name) return;
      if (residents.some((resident) => resident.name === name)) {
        setStatus('同じ利用者名がすでに登録されています。', 'warning');
        return;
      }
      residents.push({ id: `resident-${Date.now()}`, name });
      saveResidents();
      renderResidents();
      masterResidentNameInput.value = '';
      residentNameInput.value = name;
      setStatus('利用者さんを追加しました。', 'success');
    }

    function handleProductSubmit(event) {
      event.preventDefault();
      const name = masterProductNameInput.value.trim();
      const price = Number(masterProductPriceInput.value || 0);
      if (!name || Number.isNaN(price)) {
        setStatus('用品名と単価を確認してください。', 'warning');
        return;
      }
      if (products.some((product) => product.name === name)) {
        setStatus('同じ用品名がすでに登録されています。', 'warning');
        return;
      }
      const product = {
        id: `product-${Date.now()}`,
        type: masterProductTypeInput.value,
        name,
        price,
      };
      products.push(product);
      saveProducts();
      renderProducts();
      masterProductNameInput.value = '';
      masterProductPriceInput.value = 0;
      itemTypeInput.value = product.type;
      itemDetailInput.value = product.name;
      unitPriceInput.value = product.price;
      setStatus('用品を追加しました。', 'success');
    }

    function applySelectedProduct() {
      const product = products.find((entry) => entry.name === itemDetailInput.value.trim());
      if (!product) return;
      itemTypeInput.value = product.type;
      unitPriceInput.value = product.price;
    }

    function handleFormSubmit(event) {
      event.preventDefault();

      const residentName = residentNameInput.value.trim();
      const stockCount = Number(stockCountInput.value);
      const usedCount = Number(usedCountInput.value);
      const unitPrice = Number(unitPriceInput.value || 0);
      let code = itemCodeInput.value.trim();

      if (!residentName || Number.isNaN(stockCount) || Number.isNaN(usedCount) || Number.isNaN(unitPrice)) {
        setStatus('利用者名・枚数・単価を確認してください。', 'warning');
        return;
      }

      if (!code) {
        code = generateCode();
      }

      if (records.some((record) => record.code === code && record.id !== editingRecordId)) {
        setStatus('同じ管理コードがすでに登録されています。別のコードにしてください。', 'warning');
        return;
      }

      if (editingRecordId) {
        const target = records.find((record) => record.id === editingRecordId);
        if (!target) {
          setStatus('編集対象が見つかりません。', 'warning');
          return;
        }

        target.residentName = residentName;
        target.itemType = itemTypeInput.value;
        target.itemDetail = itemDetailInput.value.trim();
        target.code = code;
        target.stockCount = stockCount;
        target.usedCount = usedCount;
        target.unitPrice = unitPrice;
        target.memo = memoInput.value.trim();
        touch(target);
        saveRecords();
        renderRecords();
        if (target.id === activeWorkRecordId) {
          renderWorkRecord(target);
        }
        cancelEdit();
        setStatus('編集を保存しました。', 'success');
        return;
      }

      const now = new Date().toISOString();
      records.unshift({
        id: `record-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        residentName,
        itemType: itemTypeInput.value,
        itemDetail: itemDetailInput.value.trim(),
        code,
        stockCount,
        usedCount,
        unitPrice,
        memo: memoInput.value.trim(),
        createdAt: now,
        updatedAt: now,
      });

      saveRecords();
      renderRecords();
      recordForm.reset();
      stockCountInput.value = 0;
      usedCountInput.value = 0;
      unitPriceInput.value = 0;
      setStatus('登録しました。', 'success');
    }

    function handleScanCodeForForm() {
      scannerMode = 'assign-code';
      lastScannedCode = '';
      activeVideo = formVideo;
      formScanPanel.hidden = false;
      setStatus('読み取ったバーコード/QRを登録フォームの管理コードに入れます。', 'info');
      startScanner();
    }

    function handleGenerateCode() {
      itemCodeInput.value = generateCode();
    }

    function generateQRCode(canvas, text) {
      if (typeof QRCode === 'undefined' || !canvas) return;
      QRCode.toCanvas(canvas, text, {
        width: 180,
        margin: 1,
        color: { dark: '#111111', light: '#ffffff' },
      });
    }

    function toggleQRCode(card, record) {
      const qrSection = card.querySelector('.qr-section');
      if (!qrSection) return;

      qrSection.hidden = !qrSection.hidden;
      if (!qrSection.hidden) {
        const canvas = qrSection.querySelector('.qr-canvas');
        if (canvas && canvas.dataset.generated !== 'true') {
          generateQRCode(canvas, record.code);
          canvas.dataset.generated = 'true';
        }
      }
    }

    function ensureScanCanvas() {
      if (!scanCanvas) {
        scanCanvas = document.createElement('canvas');
        scanContext = scanCanvas.getContext('2d');
      }
    }

    async function decodeCode() {
      if (activeVideo.readyState !== HTMLMediaElement.HAVE_ENOUGH_DATA) return null;

      if ('BarcodeDetector' in window) {
        try {
          if (!barcodeDetector) {
            barcodeDetector = new BarcodeDetector({
              formats: ['qr_code', 'code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf'],
            });
          }
          const barcodes = await barcodeDetector.detect(activeVideo);
          if (barcodes.length > 0) {
            return barcodes[0].rawValue;
          }
        } catch (error) {
          barcodeDetector = null;
        }
      }

      if (!window.jsQR) return null;
      ensureScanCanvas();
      const width = activeVideo.videoWidth;
      const height = activeVideo.videoHeight;
      if (!width || !height) return null;

      scanCanvas.width = width;
      scanCanvas.height = height;
      scanContext.drawImage(activeVideo, 0, 0, width, height);
      const imageData = scanContext.getImageData(0, 0, width, height);
      const result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
      return result ? result.data : null;
    }

    async function startScanner() {
      if (scanning) return;
      if (scannerMode !== 'assign-code') {
        activeVideo = video;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('このブラウザはカメラに対応していません。', 'error');
        return;
      }

      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        activeVideo.srcObject = currentStream;
        scanning = true;
        startScanButton.disabled = true;
        stopScanButton.disabled = false;
        setStatus('カメラを起動しました。管理コードを読み取ります。', 'success');
        requestAnimationFrame(scanLoop);
      } catch (error) {
        setStatus('カメラの起動に失敗しました。ブラウザのカメラ許可を確認してください。', 'error');
      }
    }

    function stopScanner() {
      scanning = false;
      if (currentStream) {
        currentStream.getTracks().forEach((track) => track.stop());
        currentStream = null;
      }
      if (activeVideo) {
        activeVideo.srcObject = null;
      }
      formScanPanel.hidden = true;
      activeVideo = video;
      startScanButton.disabled = false;
      stopScanButton.disabled = true;
      setStatus('スキャンを停止しました。', 'info');
    }

    async function scanLoop() {
      if (!scanning) return;
      const code = await decodeCode();
      if (code && code !== lastScannedCode) {
        lastScannedCode = code;
        scanOutput.textContent = code;
        handleScannedCode(code);
      }
      requestAnimationFrame(scanLoop);
    }

    function handleScannedCode(code) {
      if (scannerMode === 'assign-code') {
        itemCodeInput.value = code;
        stopScanner();
        scannerMode = 'work';
        setStatus('読み取ったコードを管理コードに入れました。', 'success');
        return;
      }

      highlightRecord(code);
    }

    function highlightRecord(code) {
      const found = records.find((record) => record.code === code);
      document.querySelectorAll('.record-card').forEach((card) => card.classList.remove('found'));

      if (!found) {
        setStatus('該当する登録がありません。', 'warning');
        return;
      }

      searchInput.value = '';
      sortSelect.value = 'resident';
      renderRecords();
      renderWorkRecord(found);
      const card = document.querySelector(`.record-card[data-id='${found.id}']`);
      if (card) {
        card.classList.add('found');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      setStatus(`${found.residentName}さんの${found.itemType}を表示しました。`, 'success');
    }

    function handleManualLookup() {
      const code = manualCodeInput.value.trim();
      if (!code) {
        setStatus('検索する管理コードを入力してください。', 'warning');
        return;
      }
      scanOutput.textContent = code;
      highlightRecord(code);
    }

    function switchView(viewId) {
      views.forEach((view) => {
        view.hidden = view.id !== viewId;
      });
      tabButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.view === viewId);
      });
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      }
    }

    function setEventListeners() {
      residentForm.addEventListener('submit', handleResidentSubmit);
      productForm.addEventListener('submit', handleProductSubmit);
      recordForm.addEventListener('submit', handleFormSubmit);
      generateCodeButton.addEventListener('click', handleGenerateCode);
      scanCodeForFormButton.addEventListener('click', handleScanCodeForForm);
      cancelEditButton.addEventListener('click', () => {
        cancelEdit();
        setStatus('編集を取り消しました。', 'info');
      });
      searchInput.addEventListener('input', renderRecords);
      itemDetailInput.addEventListener('change', applySelectedProduct);
      sortSelect.addEventListener('change', renderRecords);
      startScanButton.addEventListener('click', startScanner);
      stopScanButton.addEventListener('click', stopScanner);
      stopFormScanButton.addEventListener('click', () => {
        scannerMode = 'work';
        stopScanner();
      });
      manualLookupButton.addEventListener('click', handleManualLookup);
      workRecordPreview.addEventListener('click', (event) => {
        const button = event.target.closest('[data-use-count]');
        if (!button) return;
        registerUseCount(Number(button.dataset.useCount));
      });
      tabButtons.forEach((button) => {
        button.addEventListener('click', () => switchView(button.dataset.view));
      });
      window.addEventListener('beforeunload', () => {
        if (currentStream) currentStream.getTracks().forEach((track) => track.stop());
      });
    }

    function init() {
      loadRecords();
      renderResidents();
      renderProducts();
      renderRecords();
      setEventListeners();
      registerServiceWorker();
      setStatus('準備完了', 'info');
    }

    init();
  </script>
</body>
</html>
