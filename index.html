<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おむつ使用記録デモ</title>
  <meta name="theme-color" content="#1f6f54" />
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f3;
      color: #17211a;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f6f7f3; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.55rem, 4vw, 2.15rem); line-height: 1.2; }
    h2 { font-size: 1.14rem; margin-bottom: 12px; }
    h3 { font-size: 1.05rem; }
    p { line-height: 1.65; }

    .app-shell { max-width: 920px; margin: 0 auto; padding: 18px; }
    header { padding: 18px 0 14px; }
    .lead { color: #526159; margin-top: 8px; }
    .version {
      display: inline-flex;
      margin-top: 10px;
      padding: 6px 9px;
      border-radius: 8px;
      background: #e8f5ee;
      border: 1px solid #77ad88;
      color: #174c2b;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(20, 38, 25, 0.06);
    }

    label { display: block; color: #34433a; font-size: 0.94rem; }
    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #c8d0c6;
      border-radius: 8px;
      background: #ffffff;
      color: #17211a;
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: #1f6f54;
      color: #ffffff;
    }

    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .secondary { background: #ffffff; color: #24352b; border-color: #c8d0c6; }
    .danger { background: #ffffff; color: #9f1d1d; border-color: #e6b8b8; }
    .active { background: #1f6f54; color: #ffffff; border-color: #1f6f54; }
    .view[hidden], .scan-box[hidden] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .tag-list, .card-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #d9ded7;
      background: #f4f6f2;
      color: #34433a;
      font-size: 0.92rem;
    }

    .card {
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
    }

    .meta { color: #526159; font-size: 0.92rem; margin-top: 4px; }
    .scan-reader {
      width: 100%;
      min-height: 220px;
      margin-top: 12px;
      border-radius: 8px;
      background: #111827;
      overflow: hidden;
    }

    .scan-reader video { width: 100% !important; }

    .selected-product {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      background: #f4f6f2;
    }

    .quantity-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .status.success { border-color: #77ad88; color: #174c2b; }
    .status.warning { border-color: #e2c06c; color: #704c00; }
    .status.error { border-color: #de9898; color: #8c1d1d; }
    .scan-feedback { margin-top: 8px; }
    .detected-code {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #e8f5ee;
      border: 1px solid #77ad88;
      color: #174c2b;
      font-weight: 800;
      word-break: break-all;
    }

    .qr-preview {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d9ded7;
      background: #f4f6f2;
    }

    .qr-preview[hidden] { display: none; }

    .qr-preview canvas {
      display: block;
      width: 180px;
      max-width: 100%;
      height: auto;
      margin-top: 8px;
      background: #ffffff;
      border-radius: 8px;
    }

    @media (max-width: 720px) {
      .grid, .quantity-row { grid-template-columns: 1fr; }
      .tabs, .button-row button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>おむつ使用記録デモ</h1>
      <p class="lead">商品バーコードを読み取り、利用者さんと使用枚数を選んで記録します。</p>
      <div id="app-version" class="version">読み込み中</div>
    </header>

    <nav class="tabs">
      <button type="button" class="tab-button active" data-view="work-view">作業する</button>
      <button type="button" class="tab-button secondary" data-view="admin-view">登録する</button>
    </nav>

    <section id="work-view" class="view">
      <div class="panel">
        <h2>作業する</h2>
        <p class="lead">商品バーコード/QRを読み取ってから、利用者さんと枚数を選びます。</p>

        <div class="button-row">
          <button type="button" id="start-work-scan">商品コードを読む</button>
          <button type="button" id="stop-work-scan" class="secondary" disabled>停止</button>
        </div>

        <div id="work-scan-box" class="scan-box" hidden>
          <div id="work-reader" class="scan-reader"></div>
          <p id="work-scan-feedback" class="meta scan-feedback">カメラ起動待ち</p>
          <div id="work-detected-code" class="detected-code" hidden></div>
        </div>

        <div class="button-row">
          <input type="text" id="manual-code" placeholder="バーコード番号を手入力" />
          <button type="button" id="manual-search" class="secondary">検索</button>
        </div>

        <div id="selected-product" class="selected-product">
          <p class="meta">商品コードを読み取ってください。</p>
        </div>

        <div class="grid">
          <label>利用者さん
            <select id="work-resident"></select>
          </label>
          <label>職員名
            <input type="text" id="staff-name" placeholder="任意" />
          </label>
        </div>

        <div class="quantity-row">
          <button type="button" data-quantity="1">1枚</button>
          <button type="button" data-quantity="2">2枚</button>
          <button type="button" data-quantity="3">3枚</button>
          <button type="button" data-quantity="4">4枚</button>
        </div>
      </div>

      <div class="panel">
        <h2>使用記録</h2>
        <div id="usage-list" class="card-list"></div>
      </div>
    </section>

    <section id="admin-view" class="view" hidden>
      <div class="panel">
        <h2>利用者さん登録</h2>
        <form id="resident-form">
          <label>名前
            <input type="text" id="resident-name" placeholder="例：山田 花子" required />
          </label>
          <div class="button-row">
            <button type="submit">追加</button>
          </div>
        </form>
        <div id="resident-list" class="tag-list"></div>
      </div>

      <div class="panel">
        <h2>商品登録</h2>
        <form id="product-form">
          <div class="grid">
            <label>商品名
              <input type="text" id="product-name" placeholder="例：夜用パッド M" required />
            </label>
            <label>バーコード / QRコード
              <input type="text" id="product-code" placeholder="読み取り、または手入力" required />
            </label>
            <label>種別
              <select id="product-type">
                <option value="尿取りパッド">尿取りパッド</option>
                <option value="テープ式おむつ">テープ式おむつ</option>
                <option value="パンツ式おむつ">パンツ式おむつ</option>
                <option value="フラットタイプ">フラットタイプ</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>単価
              <input type="number" id="product-price" min="0" value="0" />
            </label>
          </div>
          <div class="button-row">
            <button type="button" id="scan-product-code" class="secondary">バーコード/QR読取</button>
            <button type="button" id="make-serial-code" class="secondary">シリアルNO発行</button>
            <button type="button" id="make-product-qr" class="secondary">QR発行</button>
            <button type="submit">商品を追加</button>
          </div>
        </form>

        <div id="product-qr-preview" class="qr-preview" hidden>
          <strong>発行QR</strong>
          <p id="product-qr-text" class="meta"></p>
          <canvas id="product-qr-canvas" width="180" height="180"></canvas>
        </div>

        <div id="admin-scan-box" class="scan-box" hidden>
          <div id="admin-reader" class="scan-reader"></div>
          <p id="admin-scan-feedback" class="meta scan-feedback">カメラ起動待ち</p>
          <div id="admin-detected-code" class="detected-code" hidden></div>
          <div class="button-row">
            <button type="button" id="stop-admin-scan" class="secondary">読取を停止</button>
          </div>
        </div>

        <div id="product-list" class="card-list"></div>
      </div>
    </section>

    <div id="status" class="status">準備完了</div>
  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const APP_VERSION = '2026-05-20 QR発行安定版';
    const RESIDENTS_KEY = 'diaper-demo-residents-v2';
    const PRODUCTS_KEY = 'diaper-demo-products-v2';
    const USAGES_KEY = 'diaper-demo-usages-v2';

    const tabButtons = document.querySelectorAll('.tab-button');
    const views = document.querySelectorAll('.view');
    const appVersion = document.getElementById('app-version');
    const statusBox = document.getElementById('status');

    const residentForm = document.getElementById('resident-form');
    const residentNameInput = document.getElementById('resident-name');
    const residentList = document.getElementById('resident-list');
    const workResidentSelect = document.getElementById('work-resident');

    const productForm = document.getElementById('product-form');
    const productNameInput = document.getElementById('product-name');
    const productCodeInput = document.getElementById('product-code');
    const productTypeInput = document.getElementById('product-type');
    const productPriceInput = document.getElementById('product-price');
    const productList = document.getElementById('product-list');

    const selectedProductBox = document.getElementById('selected-product');
    const usageList = document.getElementById('usage-list');
    const manualCodeInput = document.getElementById('manual-code');
    const manualSearchButton = document.getElementById('manual-search');
    const staffNameInput = document.getElementById('staff-name');

    const workReader = document.getElementById('work-reader');
    const adminReader = document.getElementById('admin-reader');
    const workScanBox = document.getElementById('work-scan-box');
    const adminScanBox = document.getElementById('admin-scan-box');
    const workScanFeedback = document.getElementById('work-scan-feedback');
    const adminScanFeedback = document.getElementById('admin-scan-feedback');
    const workDetectedCode = document.getElementById('work-detected-code');
    const adminDetectedCode = document.getElementById('admin-detected-code');
    const startWorkScanButton = document.getElementById('start-work-scan');
    const stopWorkScanButton = document.getElementById('stop-work-scan');
    const scanProductCodeButton = document.getElementById('scan-product-code');
    const stopAdminScanButton = document.getElementById('stop-admin-scan');
    const makeSerialCodeButton = document.getElementById('make-serial-code');
    const makeProductQrButton = document.getElementById('make-product-qr');
    const productQrPreview = document.getElementById('product-qr-preview');
    const productQrText = document.getElementById('product-qr-text');
    const productQrCanvas = document.getElementById('product-qr-canvas');

    let residents = [];
    let products = [];
    let usages = [];
    let selectedProduct = null;
    let scanning = false;
    let scanMode = 'work';
    let scanner = null;
    let scannerStopping = false;
    let lastCode = '';
    let lastCodeAt = 0;
    let scanWaitCount = 0;

    const SUPPORTED_FORMATS = window.Html5QrcodeSupportedFormats || {};
    const SCAN_FORMATS = [
      SUPPORTED_FORMATS.QR_CODE,
      SUPPORTED_FORMATS.EAN_13,
      SUPPORTED_FORMATS.EAN_8,
      SUPPORTED_FORMATS.CODE_128,
      SUPPORTED_FORMATS.CODE_39,
      SUPPORTED_FORMATS.UPC_A,
      SUPPORTED_FORMATS.UPC_E,
      SUPPORTED_FORMATS.ITF,
    ].filter(Boolean);

    function getScanFeedback() {
      return scanMode === 'admin' ? adminScanFeedback : workScanFeedback;
    }

    function getDetectedCodeBox() {
      return scanMode === 'admin' ? adminDetectedCode : workDetectedCode;
    }

    function showDetectedCode(code) {
      const box = getDetectedCodeBox();
      box.textContent = `読み取り: ${code}`;
      box.hidden = false;
    }

    function setScanButtons(activeMode = '') {
      startWorkScanButton.disabled = activeMode === 'work' || scannerStopping;
      stopWorkScanButton.disabled = activeMode !== 'work' || scannerStopping;
      scanProductCodeButton.disabled = activeMode === 'admin' || scannerStopping;
      stopAdminScanButton.disabled = activeMode !== 'admin' || scannerStopping;
    }

    function setStatus(text, type = 'info') {
      statusBox.textContent = text;
      statusBox.className = `status ${type}`;
    }

    function yen(value) {
      return `${Number(value || 0).toLocaleString('ja-JP')}円`;
    }

    function makeSerialCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      const body = Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      return `DP-${body}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function loadData() {
      residents = JSON.parse(localStorage.getItem(RESIDENTS_KEY) || '[]');
      products = JSON.parse(localStorage.getItem(PRODUCTS_KEY) || '[]');
      usages = JSON.parse(localStorage.getItem(USAGES_KEY) || '[]');
    }

    function saveData() {
      localStorage.setItem(RESIDENTS_KEY, JSON.stringify(residents));
      localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
      localStorage.setItem(USAGES_KEY, JSON.stringify(usages));
    }

    function switchView(viewId) {
      views.forEach((view) => {
        view.hidden = view.id !== viewId;
      });
      tabButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.view === viewId);
        button.classList.toggle('secondary', button.dataset.view !== viewId);
      });
    }

    function renderResidents() {
      residentList.innerHTML = residents.length
        ? residents.map((name) => `<span class="tag">${escapeHtml(name)}</span>`).join('')
        : '<span class="tag">未登録</span>';

      workResidentSelect.innerHTML = residents.length
        ? residents.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')
        : '<option value="">利用者さんを登録してください</option>';
    }

    function renderProducts() {
      productList.innerHTML = products.length
        ? products.map((product) => `
          <article class="card">
            <h3>${escapeHtml(product.name)}</h3>
            <p class="meta">${escapeHtml(product.type)} / ${yen(product.price)}<br>コード: ${escapeHtml(product.code)}</p>
          </article>
        `).join('')
        : '<p class="meta">まだ商品が登録されていません。</p>';
    }

    function renderSelectedProduct() {
      if (!selectedProduct) {
        selectedProductBox.innerHTML = '<p class="meta">商品コードを読み取ってください。</p>';
        return;
      }

      selectedProductBox.innerHTML = `
        <h3>${escapeHtml(selectedProduct.name)}</h3>
        <p class="meta">${escapeHtml(selectedProduct.type)} / ${yen(selectedProduct.price)}<br>コード: ${escapeHtml(selectedProduct.code)}</p>
      `;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`${src} を読み込めませんでした`));
        document.head.appendChild(script);
      });
    }

    async function ensureQrLibrary() {
      if (window.QRCode && typeof QRCode.toCanvas === 'function') return;

      const sources = [
        'qrcode.min.js',
        'https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js',
        'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js',
      ];
      let lastError = null;

      for (const src of sources) {
        try {
          await loadScript(src);
          if (window.QRCode && typeof QRCode.toCanvas === 'function') return;
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error('QRライブラリを読み込めませんでした');
    }

    async function issueProductQr() {
      const code = productCodeInput.value.trim();
      if (!code) {
        setStatus('先にシリアルNOを発行するか、コードを入力してください。', 'warning');
        return;
      }

      try {
        await ensureQrLibrary();
        productQrText.textContent = `コード: ${code}`;
        productQrPreview.hidden = false;
        await QRCode.toCanvas(productQrCanvas, code, {
          width: 180,
          margin: 1,
          color: { dark: '#111111', light: '#ffffff' },
        });
        setStatus('QRを発行しました。このQRを商品や棚ラベルに貼って使えます。', 'success');
      } catch (error) {
        const message = error && error.message ? error.message : String(error);
        productQrPreview.hidden = true;
        setStatus(`QR発行に失敗しました: ${message}`, 'error');
      }
    }

    function renderUsages() {
      usageList.innerHTML = usages.length
        ? usages.slice(0, 10).map((usage) => `
          <article class="card">
            <h3>${escapeHtml(usage.resident)} / ${escapeHtml(usage.productName)} ${usage.quantity}枚</h3>
            <p class="meta">${new Date(usage.createdAt).toLocaleString('ja-JP')} / ${escapeHtml(usage.staff || '職員未入力')} / ${yen(usage.quantity * usage.price)}</p>
          </article>
        `).join('')
        : '<p class="meta">まだ使用記録がありません。</p>';
    }

    function renderAll() {
      renderResidents();
      renderProducts();
      renderSelectedProduct();
      renderUsages();
    }

    function handleResidentSubmit(event) {
      event.preventDefault();
      const name = residentNameInput.value.trim();
      if (!name) return;
      if (residents.includes(name)) {
        setStatus('同じ利用者名がすでに登録されています。', 'warning');
        return;
      }
      residents.push(name);
      residentNameInput.value = '';
      saveData();
      renderResidents();
      setStatus('利用者さんを追加しました。', 'success');
    }

    function handleProductSubmit(event) {
      event.preventDefault();
      const name = productNameInput.value.trim();
      const code = productCodeInput.value.trim();
      const price = Number(productPriceInput.value || 0);

      if (!name || !code || Number.isNaN(price)) {
        setStatus('商品名、コード、単価を確認してください。', 'warning');
        return;
      }
      if (products.some((product) => product.code === code)) {
        setStatus('同じバーコード/QRコードがすでに登録されています。', 'warning');
        return;
      }

      products.push({
        id: `product-${Date.now()}`,
        name,
        code,
        type: productTypeInput.value,
        price,
      });

      productForm.reset();
      productPriceInput.value = 0;
      productQrPreview.hidden = true;
      saveData();
      renderProducts();
      setStatus(`商品を追加しました: ${name} / ${code}`, 'success');
    }

    function findProductByCode(code) {
      const product = products.find((item) => item.code === code);
      if (!product) {
        selectedProduct = null;
        renderSelectedProduct();
        setStatus('登録されていない商品コードです。', 'warning');
        return;
      }
      selectedProduct = product;
      renderSelectedProduct();
      setStatus('商品を読み取りました。利用者さんと枚数を選んでください。', 'success');
    }

    function registerUsage(quantity) {
      if (!selectedProduct) {
        setStatus('先に商品バーコード/QRを読み取ってください。', 'warning');
        return;
      }
      const resident = workResidentSelect.value;
      if (!resident) {
        setStatus('利用者さんを選んでください。', 'warning');
        return;
      }

      usages.unshift({
        id: `usage-${Date.now()}`,
        createdAt: new Date().toISOString(),
        resident,
        productId: selectedProduct.id,
        productName: selectedProduct.name,
        productCode: selectedProduct.code,
        quantity,
        price: Number(selectedProduct.price || 0),
        staff: staffNameInput.value.trim(),
      });

      saveData();
      renderUsages();
      setStatus(`${resident}さんに ${selectedProduct.name} を${quantity}枚記録しました。`, 'success');
    }

    async function startScanner(mode) {
      if (scannerStopping) return;
      if (scanner) {
        await stopScanner({ silent: true });
      }
      scanMode = mode;
      lastCode = '';
      lastCodeAt = 0;
      scanWaitCount = 0;
      workScanBox.hidden = mode !== 'work';
      adminScanBox.hidden = mode !== 'admin';
      getDetectedCodeBox().hidden = true;
      getDetectedCodeBox().textContent = '';
      getScanFeedback().textContent = 'カメラを起動しています...';
      setScanButtons(mode);

      if (!window.Html5Qrcode) {
        getScanFeedback().textContent = '読み取りライブラリを読み込めませんでした。';
        setStatus('読み取り機能の読み込みに失敗しました。通信状態を確認してください。', 'error');
        setScanButtons('');
        return;
      }

      try {
        const readerId = mode === 'admin' ? 'admin-reader' : 'work-reader';
        scanner = new Html5Qrcode(
          readerId,
          SCAN_FORMATS.length
            ? { formatsToSupport: SCAN_FORMATS, verbose: false }
            : { verbose: false }
        );
        scanning = true;
        getScanFeedback().textContent = 'カメラを起動しています。許可が出たら許可してください。';
        setStatus('読み取り中です。', 'info');

        await startCameraWithFallback();
      } catch (error) {
        const message = error && error.message ? error.message : String(error);
        getScanFeedback().textContent = `カメラを起動できませんでした: ${message}`;
        setStatus('カメラの起動に失敗しました。別画面のカメラを停止して、ブラウザのカメラ許可を確認してください。', 'error');
        workScanBox.hidden = true;
        adminScanBox.hidden = true;
        setScanButtons('');
        scanning = false;
        scanner = null;
      }
    }

    async function startCameraWithFallback() {
      const onScanFailure = () => {
        scanWaitCount += 1;
        if (scanWaitCount % 12 === 0) {
          getScanFeedback().textContent = 'カメラは動いています。まだ数字は読めていません。バーコードを明るく、横向きで中央へ。';
        }
      };
      const cameraConfigs = [
        { facingMode: 'environment' },
        { facingMode: { ideal: 'environment' } },
        { facingMode: 'user' },
        {},
      ];
      const scannerConfig = {
        fps: 10,
        qrbox: { width: 260, height: 140 },
      };
      let lastError = null;

      for (const cameraConfig of cameraConfigs) {
        try {
          await scanner.start(cameraConfig, scannerConfig, handleDecodedCode, onScanFailure);
          return;
        } catch (error) {
          lastError = error;
          try {
            await scanner.clear();
          } catch (clearError) {
            // Some browsers leave nothing to clear after a failed start.
          }
        }
      }

      throw lastError || new Error('camera start failed');
    }

    async function stopScanner(options = {}) {
      scannerStopping = true;
      scanning = false;
      setScanButtons('');
      if (scanner) {
        try {
          await scanner.stop();
          await scanner.clear();
        } catch (error) {
          // Already stopped or not fully started.
        }
        scanner = null;
      }
      workScanBox.hidden = true;
      adminScanBox.hidden = true;
      workScanFeedback.textContent = 'カメラ起動待ち';
      adminScanFeedback.textContent = 'カメラ起動待ち';
      scannerStopping = false;
      setScanButtons('');
      if (!options.silent) {
        setStatus('読み取りを停止しました。', 'info');
      }
    }

    function handleDecodedCode(code) {
      const now = Date.now();
      if (!code || (code === lastCode && now - lastCodeAt < 1200)) return;

      lastCode = code;
      lastCodeAt = now;
      showDetectedCode(code);

      if (scanMode === 'admin') {
        adminScanFeedback.textContent = `認識しました: ${code}`;
        productCodeInput.value = code;
        stopScanner({ silent: true });
        setStatus(`商品コードを入力しました: ${code}`, 'success');
      } else {
        workScanFeedback.textContent = `認識しました: ${code}`;
        manualCodeInput.value = code;
        findProductByCode(code);
      }
    }

    function initEvents() {
      tabButtons.forEach((button) => {
        button.addEventListener('click', () => switchView(button.dataset.view));
      });
      residentForm.addEventListener('submit', handleResidentSubmit);
      productForm.addEventListener('submit', handleProductSubmit);
      scanProductCodeButton.addEventListener('click', () => startScanner('admin'));
      stopAdminScanButton.addEventListener('click', stopScanner);
      startWorkScanButton.addEventListener('click', () => startScanner('work'));
      stopWorkScanButton.addEventListener('click', stopScanner);
      manualSearchButton.addEventListener('click', () => findProductByCode(manualCodeInput.value.trim()));
      makeSerialCodeButton.addEventListener('click', () => {
        productCodeInput.value = makeSerialCode();
        productQrPreview.hidden = true;
        setStatus('シリアルNOを発行しました。必要ならQR発行を押してください。', 'success');
      });
      makeProductQrButton.addEventListener('click', issueProductQr);
      document.querySelectorAll('[data-quantity]').forEach((button) => {
        button.addEventListener('click', () => registerUsage(Number(button.dataset.quantity)));
      });
      window.addEventListener('beforeunload', () => {
        if (scanner) scanner.stop().catch(() => {});
      });
    }

    function init() {
      loadData();
      renderAll();
      initEvents();
      appVersion.textContent = `最新版: ${APP_VERSION}`;
      setStatus(`準備完了 / ${APP_VERSION}`, 'info');
    }

    init();
  </script>
</body>
</html>
