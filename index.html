<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おむつ使用記録デモ</title>
  <meta name="theme-color" content="#1f6f54" />
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f3;
      color: #17211a;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f6f7f3; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.55rem, 4vw, 2.1rem); line-height: 1.2; }
    h2 { font-size: 1.12rem; margin-bottom: 12px; }
    h3 { font-size: 1.02rem; }
    p { line-height: 1.65; }

    .app-shell { max-width: 920px; margin: 0 auto; padding: 18px; }
    header { padding: 18px 0 14px; }
    .lead { color: #526159; margin-top: 8px; }
    .version {
      display: inline-flex;
      margin-top: 10px;
      padding: 6px 9px;
      border-radius: 8px;
      background: #e8f5ee;
      border: 1px solid #77ad88;
      color: #174c2b;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(20, 38, 25, 0.06);
    }

    label { display: block; color: #34433a; font-size: 0.94rem; }
    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #c8d0c6;
      border-radius: 8px;
      background: #ffffff;
      color: #17211a;
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: #1f6f54;
      color: #ffffff;
    }

    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .secondary { background: #ffffff; color: #24352b; border-color: #c8d0c6; }
    .danger { background: #ffffff; color: #9f1d1d; border-color: #e6b8b8; }
    .active { background: #1f6f54; color: #ffffff; border-color: #1f6f54; }
    .view[hidden], .scan-box[hidden], .qr-preview[hidden], .detected-code[hidden] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .button-row input { flex: 1 1 220px; }
    .card-list, .tag-list { display: grid; gap: 10px; margin-top: 12px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #d9ded7;
      background: #f4f6f2;
      color: #34433a;
      font-size: 0.92rem;
    }

    .card {
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
    }

    .meta { color: #526159; font-size: 0.92rem; margin-top: 4px; }
    .scan-reader {
      width: 100%;
      min-height: 260px;
      margin-top: 12px;
      border-radius: 8px;
      background: #111827;
      overflow: hidden;
    }

    .scan-reader video {
      display: block;
      width: 100%;
      max-height: 62vh;
      object-fit: cover;
    }

    .selected-product {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      background: #f4f6f2;
    }

    .quantity-row {
      display: grid;
      grid-template-columns: 56px minmax(90px, 1fr) 56px minmax(120px, 1.4fr);
      gap: 8px;
      margin-top: 12px;
      align-items: stretch;
    }

    .quantity-display {
      display: grid;
      place-items: center;
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid #c8d0c6;
      background: #ffffff;
      color: #17211a;
      font-size: 1.25rem;
      font-weight: 800;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .status.success { border-color: #77ad88; color: #174c2b; }
    .status.warning { border-color: #e2c06c; color: #704c00; }
    .status.error { border-color: #de9898; color: #8c1d1d; }
    .detected-code {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #e8f5ee;
      border: 1px solid #77ad88;
      color: #174c2b;
      font-weight: 800;
      word-break: break-all;
    }

    .qr-preview {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d9ded7;
      background: #f4f6f2;
    }

    .qr-preview canvas {
      display: block;
      width: 180px;
      max-width: 100%;
      height: auto;
      margin-top: 8px;
      background: #ffffff;
      border-radius: 8px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr 1fr; }
      .button-row button { width: 100%; }
      .quantity-row { grid-template-columns: 56px minmax(80px, 1fr) 56px; }
      #record-quantity { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>おむつ使用記録デモ</h1>
      <p class="lead">商品QRまたはシリアルNOで商品を選び、利用者さんと枚数を記録します。</p>
      <div id="app-version" class="version">読み込み中</div>
    </header>

    <nav class="tabs">
      <button type="button" class="tab-button active" data-view="work-view">作業する</button>
      <button type="button" class="tab-button secondary" data-view="admin-view">登録する</button>
    </nav>

    <section id="work-view" class="view">
      <div class="panel">
        <h2>作業する</h2>
        <p class="lead">商品QRを読むか、シリアルNOを入力してください。</p>

        <div class="button-row">
          <button type="button" id="start-work-scan">商品QRを読む</button>
          <button type="button" id="stop-work-scan" class="secondary" disabled>停止</button>
        </div>

        <div id="work-scan-box" class="scan-box" hidden>
          <div id="work-reader" class="scan-reader"></div>
          <p id="work-scan-feedback" class="meta">カメラ起動待ち</p>
          <div id="work-detected-code" class="detected-code" hidden></div>
        </div>

        <div class="button-row">
          <input type="text" id="manual-code" placeholder="シリアルNOを入力 例: DP-ABCDEFGH" autocomplete="off" />
          <button type="button" id="manual-search" class="secondary">検索</button>
        </div>

        <div id="selected-product" class="selected-product">
          <p class="meta">商品QRを読み取るか、シリアルNOを入力してください。</p>
        </div>

        <div class="grid">
          <label>利用者さん
            <select id="work-resident"></select>
          </label>
          <label>職員名
            <input type="text" id="staff-name" placeholder="任意" />
          </label>
        </div>

        <div class="quantity-row">
          <button type="button" id="decrease-quantity" class="secondary">−</button>
          <div id="quantity-display" class="quantity-display">1枚</div>
          <button type="button" id="increase-quantity">＋</button>
          <button type="button" id="record-quantity">記録する</button>
        </div>
      </div>

      <div class="panel">
        <h2>使用記録</h2>
        <div id="usage-list" class="card-list"></div>
      </div>
    </section>

    <section id="admin-view" class="view" hidden>
      <div class="panel">
        <h2>利用者さん登録</h2>
        <form id="resident-form">
          <label>名前
            <input type="text" id="resident-name" placeholder="例: 山田 花子" required />
          </label>
          <div class="button-row">
            <button type="submit">追加</button>
          </div>
        </form>
        <div id="resident-list" class="tag-list"></div>
      </div>

      <div class="panel">
        <h2>商品登録</h2>
        <form id="product-form">
          <div class="grid">
            <label>商品名
              <input type="text" id="product-name" placeholder="例: 夜用パッド M" required />
            </label>
            <label>シリアルNO
              <input type="text" id="product-code" placeholder="シリアルNO発行、QR読取、または手入力" required />
            </label>
            <label>種別
              <select id="product-type">
                <option value="尿取りパッド">尿取りパッド</option>
                <option value="テープ式おむつ">テープ式おむつ</option>
                <option value="パンツ式おむつ">パンツ式おむつ</option>
                <option value="フラットタイプ">フラットタイプ</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>単価
              <input type="number" id="product-price" min="0" value="0" />
            </label>
          </div>
          <div class="button-row">
            <button type="button" id="make-serial-code" class="secondary">シリアルNO発行</button>
            <button type="button" id="make-product-qr" class="secondary">QR発行</button>
            <button type="button" id="scan-product-code" class="secondary">QR読取</button>
            <button type="submit">商品を追加</button>
          </div>
        </form>

        <div id="product-qr-preview" class="qr-preview" hidden>
          <strong>発行QR</strong>
          <p id="product-qr-text" class="meta"></p>
          <canvas id="product-qr-canvas" width="180" height="180"></canvas>
        </div>

        <div id="admin-scan-box" class="scan-box" hidden>
          <div id="admin-reader" class="scan-reader"></div>
          <p id="admin-scan-feedback" class="meta">カメラ起動待ち</p>
          <div id="admin-detected-code" class="detected-code" hidden></div>
          <div class="button-row">
            <button type="button" id="stop-admin-scan" class="secondary">読取を停止</button>
          </div>
        </div>

        <div id="product-list" class="card-list"></div>
      </div>
    </section>

    <div id="status" class="status">準備完了</div>
  </main>

  <script src="qrcode.min.js"></script>
  <script src="jsQR.js"></script>
  <script>
    const APP_VERSION = '2026-05-20 ＋−枚数版';
    const RESIDENTS_KEY = 'diaper-demo-residents-v2';
    const PRODUCTS_KEY = 'diaper-demo-products-v2';
    const USAGES_KEY = 'diaper-demo-usages-v2';

    const $ = (id) => document.getElementById(id);
    const tabButtons = document.querySelectorAll('.tab-button');
    const views = document.querySelectorAll('.view');
    const appVersion = $('app-version');
    const statusBox = $('status');
    const residentForm = $('resident-form');
    const residentNameInput = $('resident-name');
    const residentList = $('resident-list');
    const workResidentSelect = $('work-resident');
    const productForm = $('product-form');
    const productNameInput = $('product-name');
    const productCodeInput = $('product-code');
    const productTypeInput = $('product-type');
    const productPriceInput = $('product-price');
    const productList = $('product-list');
    const selectedProductBox = $('selected-product');
    const usageList = $('usage-list');
    const manualCodeInput = $('manual-code');
    const staffNameInput = $('staff-name');
    const workReader = $('work-reader');
    const adminReader = $('admin-reader');
    const workScanBox = $('work-scan-box');
    const adminScanBox = $('admin-scan-box');
    const workScanFeedback = $('work-scan-feedback');
    const adminScanFeedback = $('admin-scan-feedback');
    const workDetectedCode = $('work-detected-code');
    const adminDetectedCode = $('admin-detected-code');
    const startWorkScanButton = $('start-work-scan');
    const stopWorkScanButton = $('stop-work-scan');
    const scanProductCodeButton = $('scan-product-code');
    const stopAdminScanButton = $('stop-admin-scan');
    const productQrPreview = $('product-qr-preview');
    const productQrText = $('product-qr-text');
    const productQrCanvas = $('product-qr-canvas');
    const decreaseQuantityButton = $('decrease-quantity');
    const increaseQuantityButton = $('increase-quantity');
    const recordQuantityButton = $('record-quantity');
    const quantityDisplay = $('quantity-display');

    let residents = [];
    let products = [];
    let usages = [];
    let selectedProduct = null;
    let selectedQuantity = 1;
    let scanMode = '';
    let currentStream = null;
    let activeVideo = null;
    let scanCanvas = null;
    let scanContext = null;
    let scanFrameId = 0;
    let lastCode = '';
    let lastCodeAt = 0;
    let scanWaitCount = 0;
    let scannerStopping = false;

    function setStatus(text, type = 'info') {
      statusBox.textContent = text;
      statusBox.className = `status ${type}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function yen(value) {
      return `${Number(value || 0).toLocaleString('ja-JP')}円`;
    }

    function loadData() {
      residents = JSON.parse(localStorage.getItem(RESIDENTS_KEY) || '[]');
      products = JSON.parse(localStorage.getItem(PRODUCTS_KEY) || '[]');
      usages = JSON.parse(localStorage.getItem(USAGES_KEY) || '[]');
    }

    function saveData() {
      localStorage.setItem(RESIDENTS_KEY, JSON.stringify(residents));
      localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
      localStorage.setItem(USAGES_KEY, JSON.stringify(usages));
    }

    function disableServiceWorkerCache() {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
        .catch(() => {});
    }

    function switchView(viewId) {
      views.forEach((view) => {
        view.hidden = view.id !== viewId;
      });
      tabButtons.forEach((button) => {
        const active = button.dataset.view === viewId;
        button.classList.toggle('active', active);
        button.classList.toggle('secondary', !active);
      });
    }

    function renderResidents() {
      residentList.innerHTML = residents.length
        ? residents.map((name) => `<span class="tag">${escapeHtml(name)}</span>`).join('')
        : '<span class="tag">未登録</span>';

      workResidentSelect.innerHTML = residents.length
        ? residents.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')
        : '<option value="">利用者さんを登録してください</option>';
    }

    function renderProducts() {
      productList.innerHTML = products.length
        ? products.map((product) => `
          <article class="card">
            <h3>${escapeHtml(product.name)}</h3>
            <p class="meta">${escapeHtml(product.type)} / ${yen(product.price)}<br>シリアルNO: ${escapeHtml(product.code)}</p>
          </article>
        `).join('')
        : '<p class="meta">まだ商品が登録されていません。</p>';
    }

    function renderSelectedProduct() {
      if (!selectedProduct) {
        selectedProductBox.innerHTML = '<p class="meta">商品QRを読み取るか、シリアルNOを入力してください。</p>';
        return;
      }
      selectedProductBox.innerHTML = `
        <h3>${escapeHtml(selectedProduct.name)}</h3>
        <p class="meta">${escapeHtml(selectedProduct.type)} / ${yen(selectedProduct.price)}<br>シリアルNO: ${escapeHtml(selectedProduct.code)}</p>
      `;
    }

    function renderUsages() {
      usageList.innerHTML = usages.length
        ? usages.slice(0, 20).map((usage) => `
          <article class="card">
            <h3>${escapeHtml(usage.resident)} / ${escapeHtml(usage.productName)} ${usage.quantity}枚</h3>
            <p class="meta">${new Date(usage.createdAt).toLocaleString('ja-JP')} / ${escapeHtml(usage.staff || '職員未入力')} / ${yen(usage.quantity * usage.price)}</p>
          </article>
        `).join('')
        : '<p class="meta">まだ使用記録がありません。</p>';
    }

    function renderQuantity() {
      quantityDisplay.textContent = `${selectedQuantity}枚`;
      decreaseQuantityButton.disabled = selectedQuantity <= 1;
    }

    function renderAll() {
      renderResidents();
      renderProducts();
      renderSelectedProduct();
      renderUsages();
      renderQuantity();
    }

    function makeSerialCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      const body = Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      return `DP-${body}`;
    }

    function findProductByCode(rawCode) {
      const code = rawCode.trim();
      if (!code) {
        setStatus('シリアルNOを入力してください。', 'warning');
        return;
      }
      const product = products.find((item) => item.code === code);
      if (!product) {
        selectedProduct = null;
        renderSelectedProduct();
        setStatus(`登録されていないシリアルNOです: ${code}`, 'warning');
        return;
      }
      selectedProduct = product;
      renderSelectedProduct();
      setStatus('商品を選択しました。利用者さんと枚数を選んでください。', 'success');
    }

    function setScanButtons(activeMode = '') {
      startWorkScanButton.disabled = activeMode === 'work' || scannerStopping;
      stopWorkScanButton.disabled = activeMode !== 'work' || scannerStopping;
      scanProductCodeButton.disabled = activeMode === 'admin' || scannerStopping;
      stopAdminScanButton.disabled = activeMode !== 'admin' || scannerStopping;
    }

    function getScanFeedback() {
      return scanMode === 'admin' ? adminScanFeedback : workScanFeedback;
    }

    function getDetectedCodeBox() {
      return scanMode === 'admin' ? adminDetectedCode : workDetectedCode;
    }

    function showDetectedCode(code) {
      const box = getDetectedCodeBox();
      box.textContent = `QR認識しました: ${code}`;
      box.hidden = false;
    }

    function ensureQrReader() {
      if (window.jsQR) return true;
      setStatus('QR読み取り部品を読み込めませんでした。jsQR.js を一緒にアップロードしてください。', 'error');
      return false;
    }

    function ensureQrGenerator() {
      if (window.QRCode && typeof QRCode.toCanvas === 'function') return true;
      setStatus('QR発行部品を読み込めませんでした。qrcode.min.js を一緒にアップロードしてください。', 'error');
      return false;
    }

    async function openCamera() {
      const configs = [
        { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
        { video: { facingMode: 'environment' } },
        { video: true },
      ];
      let lastError = null;
      for (const constraints of configs) {
        try {
          return await navigator.mediaDevices.getUserMedia(constraints);
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error('camera start failed');
    }

    async function startScanner(mode) {
      if (scannerStopping || !ensureQrReader()) return;
      if (currentStream) await stopScanner({ silent: true });

      scanMode = mode;
      lastCode = '';
      lastCodeAt = 0;
      scanWaitCount = 0;
      workScanBox.hidden = mode !== 'work';
      adminScanBox.hidden = mode !== 'admin';
      getDetectedCodeBox().hidden = true;
      getDetectedCodeBox().textContent = '';
      getScanFeedback().textContent = 'カメラを起動しています...';
      setScanButtons(mode);

      try {
        const reader = mode === 'admin' ? adminReader : workReader;
        reader.innerHTML = '';
        activeVideo = document.createElement('video');
        activeVideo.autoplay = true;
        activeVideo.muted = true;
        activeVideo.playsInline = true;
        activeVideo.setAttribute('playsinline', '');
        reader.appendChild(activeVideo);

        currentStream = await openCamera();
        activeVideo.srcObject = currentStream;
        await activeVideo.play();

        getScanFeedback().textContent = 'カメラ起動OK。QR全体を中央に映してください。';
        setStatus('QR読み取り中です。', 'info');
        scanFrameId = requestAnimationFrame(scanLoop);
      } catch (error) {
        const message = error && error.message ? error.message : String(error);
        getScanFeedback().textContent = `カメラを起動できませんでした: ${message}`;
        setStatus('カメラ許可、HTTPS、別アプリのカメラ使用を確認してください。', 'error');
        await stopScanner({ silent: true });
      }
    }

    function ensureScanCanvas() {
      if (scanCanvas) return;
      scanCanvas = document.createElement('canvas');
      scanContext = scanCanvas.getContext('2d', { willReadFrequently: true });
    }

    function decodeQrFromVideo() {
      if (!activeVideo || activeVideo.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return '';
      const width = activeVideo.videoWidth;
      const height = activeVideo.videoHeight;
      if (!width || !height) return '';

      ensureScanCanvas();
      scanCanvas.width = width;
      scanCanvas.height = height;
      scanContext.drawImage(activeVideo, 0, 0, width, height);
      const imageData = scanContext.getImageData(0, 0, width, height);
      const result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
      return result ? result.data : '';
    }

    function scanLoop() {
      if (!currentStream) return;
      const code = decodeQrFromVideo();
      const now = Date.now();

      if (code && (code !== lastCode || now - lastCodeAt > 1200)) {
        handleDecodedCode(code);
      } else if (!code) {
        scanWaitCount += 1;
        if (scanWaitCount % 45 === 0) {
          getScanFeedback().textContent = 'カメラは動いています。QR全体を明るく、中央に映してください。';
        }
      }

      scanFrameId = requestAnimationFrame(scanLoop);
    }

    async function stopScanner(options = {}) {
      scannerStopping = true;
      if (scanFrameId) {
        cancelAnimationFrame(scanFrameId);
        scanFrameId = 0;
      }
      setScanButtons('');
      if (currentStream) {
        currentStream.getTracks().forEach((track) => track.stop());
        currentStream = null;
      }
      if (activeVideo) {
        activeVideo.srcObject = null;
        activeVideo = null;
      }
      workReader.innerHTML = '';
      adminReader.innerHTML = '';
      workScanBox.hidden = true;
      adminScanBox.hidden = true;
      workScanFeedback.textContent = 'カメラ起動待ち';
      adminScanFeedback.textContent = 'カメラ起動待ち';
      scanMode = '';
      scannerStopping = false;
      setScanButtons('');
      if (!options.silent) setStatus('読み取りを停止しました。', 'info');
    }

    function handleDecodedCode(code) {
      const now = Date.now();
      if (!code || (code === lastCode && now - lastCodeAt < 1200)) return;

      lastCode = code;
      lastCodeAt = now;
      showDetectedCode(code);

      if (scanMode === 'admin') {
        productCodeInput.value = code;
        adminScanFeedback.textContent = `認識しました: ${code}`;
        stopScanner({ silent: true });
        setStatus(`シリアルNOを入力しました: ${code}`, 'success');
        return;
      }

      manualCodeInput.value = code;
      workScanFeedback.textContent = `認識しました: ${code}`;
      findProductByCode(code);
    }

    async function issueProductQr() {
      const code = productCodeInput.value.trim();
      if (!code) {
        setStatus('先にシリアルNOを発行するか、シリアルNOを入力してください。', 'warning');
        return;
      }
      if (!ensureQrGenerator()) return;

      productQrText.textContent = `シリアルNO: ${code}`;
      productQrPreview.hidden = false;
      try {
        await QRCode.toCanvas(productQrCanvas, code, {
          width: 180,
          margin: 2,
          errorCorrectionLevel: 'M',
        });
        setStatus('QRを発行しました。表示されたQRを印刷して使えます。', 'success');
      } catch (error) {
        setStatus('QR発行に失敗しました。シリアルNOを確認してください。', 'error');
      }
    }

    function handleResidentSubmit(event) {
      event.preventDefault();
      const name = residentNameInput.value.trim();
      if (!name) return;
      if (residents.includes(name)) {
        setStatus('同じ利用者名がすでに登録されています。', 'warning');
        return;
      }
      residents.push(name);
      residentNameInput.value = '';
      saveData();
      renderResidents();
      setStatus('利用者さんを追加しました。', 'success');
    }

    function handleProductSubmit(event) {
      event.preventDefault();
      const name = productNameInput.value.trim();
      const code = productCodeInput.value.trim();
      const price = Number(productPriceInput.value || 0);

      if (!name || !code || Number.isNaN(price)) {
        setStatus('商品名、シリアルNO、単価を確認してください。', 'warning');
        return;
      }
      if (products.some((product) => product.code === code)) {
        setStatus('同じシリアルNOがすでに登録されています。', 'warning');
        return;
      }

      products.push({
        id: `product-${Date.now()}`,
        name,
        code,
        type: productTypeInput.value,
        price,
      });

      productForm.reset();
      productPriceInput.value = 0;
      productQrPreview.hidden = true;
      saveData();
      renderProducts();
      setStatus(`商品を追加しました: ${name}`, 'success');
    }

    function registerUsage() {
      if (!selectedProduct) {
        setStatus('先に商品QRを読むか、シリアルNOを検索してください。', 'warning');
        return;
      }
      const resident = workResidentSelect.value;
      if (!resident) {
        setStatus('利用者さんを選んでください。', 'warning');
        return;
      }

      usages.unshift({
        id: `usage-${Date.now()}`,
        createdAt: new Date().toISOString(),
        resident,
        productId: selectedProduct.id,
        productName: selectedProduct.name,
        productCode: selectedProduct.code,
        quantity: selectedQuantity,
        price: Number(selectedProduct.price || 0),
        staff: staffNameInput.value.trim(),
      });

      const message = `${resident}さんに ${selectedProduct.name} を${selectedQuantity}枚記録しました。`;
      selectedQuantity = 1;
      saveData();
      renderUsages();
      renderQuantity();
      setStatus(message, 'success');
    }

    function initEvents() {
      tabButtons.forEach((button) => {
        button.addEventListener('click', () => switchView(button.dataset.view));
      });
      residentForm.addEventListener('submit', handleResidentSubmit);
      productForm.addEventListener('submit', handleProductSubmit);
      $('make-serial-code').addEventListener('click', () => {
        productCodeInput.value = makeSerialCode();
        productQrPreview.hidden = true;
        setStatus('シリアルNOを発行しました。必要ならQR発行を押してください。', 'success');
      });
      $('make-product-qr').addEventListener('click', issueProductQr);
      scanProductCodeButton.addEventListener('click', () => startScanner('admin'));
      stopAdminScanButton.addEventListener('click', () => stopScanner());
      startWorkScanButton.addEventListener('click', () => startScanner('work'));
      stopWorkScanButton.addEventListener('click', () => stopScanner());
      $('manual-search').addEventListener('click', () => findProductByCode(manualCodeInput.value));
      manualCodeInput.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        findProductByCode(manualCodeInput.value);
      });
      decreaseQuantityButton.addEventListener('click', () => {
        selectedQuantity = Math.max(1, selectedQuantity - 1);
        renderQuantity();
      });
      increaseQuantityButton.addEventListener('click', () => {
        selectedQuantity += 1;
        renderQuantity();
      });
      recordQuantityButton.addEventListener('click', registerUsage);
      window.addEventListener('beforeunload', () => {
        if (currentStream) currentStream.getTracks().forEach((track) => track.stop());
      });
    }

    function init() {
      disableServiceWorkerCache();
      loadData();
      renderAll();
      initEvents();
      appVersion.textContent = `最新版: ${APP_VERSION}`;
      setStatus(`準備完了 / ${APP_VERSION}`, 'info');
    }

    init();
  </script>
</body>
</html>
