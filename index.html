<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>おむつ在庫・使用枚数管理</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f3;
      color: #17211a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f7f3;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      margin-bottom: 18px;
      padding: 18px 0 4px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(1.55rem, 4vw, 2.25rem);
      line-height: 1.2;
    }

    h2 { font-size: 1.15rem; margin-bottom: 12px; }
    h3 { font-size: 1.08rem; }

    p, li { line-height: 1.65; }

    .lead {
      color: #4b5b52;
      margin-top: 8px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(20, 38, 25, 0.06);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.93rem;
      color: #34433a;
    }

    input, select, textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #c8d0c6;
      border-radius: 8px;
      background: #ffffff;
      color: #17211a;
      font: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 82px;
    }

    .full-span { grid-column: 1 / -1; }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: #1f6f54;
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .secondary-button {
      background: #ffffff;
      color: #24352b;
      border-color: #c8d0c6;
    }

    .danger-button {
      background: #ffffff;
      color: #9f1d1d;
      border-color: #e6b8b8;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      background: #eef3ec;
      border: 1px solid #d5ded2;
      border-radius: 8px;
      padding: 14px;
    }

    .summary-card strong {
      display: block;
      font-size: 1.65rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .summary-card span {
      color: #526159;
      font-size: 0.9rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(160px, 0.6fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-card {
      border: 1px solid #d9ded7;
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .record-card.found {
      border-color: #1f6f54;
      box-shadow: 0 0 0 3px rgba(31, 111, 84, 0.16);
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .record-meta {
      color: #526159;
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .stat {
      background: #f4f6f2;
      border-radius: 8px;
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
    }

    .stat span {
      display: block;
      color: #5c685f;
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .record-actions {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .qr-section {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .qr-box {
      max-width: 190px;
      margin-bottom: 8px;
    }

    .qr-box canvas {
      width: 100%;
      height: auto;
      background: #ffffff;
      border-radius: 8px;
    }

    .scanner-panel video {
      width: 100%;
      min-height: 220px;
      margin-top: 12px;
      border-radius: 8px;
      background: #111827;
      object-fit: cover;
    }

    .scan-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-result, .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f6f2;
      border: 1px solid #d9ded7;
    }

    .status.success { border-color: #77ad88; color: #174c2b; }
    .status.error { border-color: #de9898; color: #8c1d1d; }
    .status.warning { border-color: #e2c06c; color: #704c00; }

    .empty {
      color: #526159;
      padding: 14px 0;
    }

    @media (max-width: 760px) {
      .form-grid, .summary-grid, .toolbar, .stats-row, .record-actions {
        grid-template-columns: 1fr;
      }

      .button-row button, .scan-controls button, .record-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>おむつ在庫・使用枚数管理</h1>
      <p class="lead">介護施設の利用者さんごとに、おむつ類の現在庫・使用枚数・ご家族への請求予定額を確認できます。</p>
    </header>

    <section class="panel">
      <h2>利用者さんの用品を登録</h2>
      <form id="record-form">
        <div class="form-grid">
          <label>利用者名
            <input type="text" id="resident-name" placeholder="例：山田 花子" required />
          </label>
          <label>用品種別
            <select id="item-type">
              <option value="テープ式おむつ">テープ式おむつ</option>
              <option value="パンツ式おむつ">パンツ式おむつ</option>
              <option value="尿取りパッド">尿取りパッド</option>
              <option value="フラットタイプ">フラットタイプ</option>
              <option value="その他">その他</option>
            </select>
          </label>
          <label>サイズ・商品名
            <input type="text" id="item-detail" placeholder="例：Mサイズ / 夜用パッド" />
          </label>
          <label>管理コード
            <input type="text" id="item-code" placeholder="自動生成できます" />
          </label>
          <label>現在庫
            <input type="number" id="stock-count" value="0" min="0" required />
          </label>
          <label>今月の使用枚数
            <input type="number" id="used-count" value="0" min="0" required />
          </label>
          <label>1枚あたり単価
            <input type="number" id="unit-price" value="0" min="0" step="1" />
          </label>
          <label class="full-span">メモ
            <textarea id="memo" placeholder="例：ご家族持ち込み、施設購入、次回補充予定など"></textarea>
          </label>
        </div>
        <div class="button-row">
          <button type="button" id="generate-code" class="secondary-button">管理コード生成</button>
          <button type="submit">登録する</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>集計</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <strong id="total-residents">0</strong>
          <span>利用者数</span>
        </div>
        <div class="summary-card">
          <strong id="total-records">0</strong>
          <span>登録用品</span>
        </div>
        <div class="summary-card">
          <strong id="total-used">0</strong>
          <span>今月の使用枚数</span>
        </div>
        <div class="summary-card">
          <strong id="total-billing">0円</strong>
          <span>請求予定額</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>利用者別一覧</h2>
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="利用者名・用品・管理コードで検索" />
        <select id="sort-select">
          <option value="resident">利用者名順</option>
          <option value="low-stock">在庫が少ない順</option>
          <option value="billing">請求額が高い順</option>
          <option value="updated">更新が新しい順</option>
        </select>
      </div>
      <div id="record-list" class="record-list"></div>
    </section>

    <section class="panel scanner-panel">
      <h2>QRで検索</h2>
      <p class="lead">QRを読み取ると、該当する利用者さんの用品カードを表示します。誤登録防止のため、読み取りだけでは使用枚数は増えません。</p>
      <div class="scan-controls">
        <button id="start-scan">スキャン開始</button>
        <button id="stop-scan" class="secondary-button" disabled>停止</button>
      </div>
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-result">
        <strong>読み取り結果:</strong>
        <span id="scan-output">なし</span>
      </div>
      <div class="button-row">
        <input type="text" id="manual-code" placeholder="管理コードを手入力" />
        <button id="manual-lookup" class="secondary-button">検索</button>
      </div>
      <div id="status-message" class="status">準備完了</div>
    </section>
  </main>

  <script src="jsQR.js"></script>
  <script src="qrcode.min.js"></script>
  <script>
    const STORAGE_KEY = 'care-diaper-records-v1';

    const recordForm = document.getElementById('record-form');
    const residentNameInput = document.getElementById('resident-name');
    const itemTypeInput = document.getElementById('item-type');
    const itemDetailInput = document.getElementById('item-detail');
    const itemCodeInput = document.getElementById('item-code');
    const stockCountInput = document.getElementById('stock-count');
    const usedCountInput = document.getElementById('used-count');
    const unitPriceInput = document.getElementById('unit-price');
    const memoInput = document.getElementById('memo');
    const generateCodeButton = document.getElementById('generate-code');
    const totalResidents = document.getElementById('total-residents');
    const totalRecords = document.getElementById('total-records');
    const totalUsed = document.getElementById('total-used');
    const totalBilling = document.getElementById('total-billing');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort-select');
    const recordList = document.getElementById('record-list');
    const startScanButton = document.getElementById('start-scan');
    const stopScanButton = document.getElementById('stop-scan');
    const video = document.getElementById('video');
    const scanOutput = document.getElementById('scan-output');
    const manualCodeInput = document.getElementById('manual-code');
    const manualLookupButton = document.getElementById('manual-lookup');
    const statusMessage = document.getElementById('status-message');

    let records = [];
    let currentStream = null;
    let scanning = false;
    let scanCanvas = null;
    let scanContext = null;
    let lastScannedCode = '';

    function yen(value) {
      return `${Number(value || 0).toLocaleString('ja-JP')}円`;
    }

    function setStatus(text, type = 'info') {
      statusMessage.textContent = text;
      statusMessage.className = `status ${type}`;
    }

    function loadRecords() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        records = [];
        return;
      }
      try {
        records = JSON.parse(stored);
      } catch (error) {
        records = [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function generateCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      const body = Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      return `OM-${body}`;
    }

    function getBilling(record) {
      return Number(record.usedCount || 0) * Number(record.unitPrice || 0);
    }

    function updateSummary() {
      const residents = new Set(records.map((record) => record.residentName.trim()).filter(Boolean));
      const used = records.reduce((sum, record) => sum + Number(record.usedCount || 0), 0);
      const billing = records.reduce((sum, record) => sum + getBilling(record), 0);

      totalResidents.textContent = residents.size;
      totalRecords.textContent = records.length;
      totalUsed.textContent = used;
      totalBilling.textContent = yen(billing);
    }

    function getVisibleRecords() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = records.filter((record) => {
        const text = [
          record.residentName,
          record.itemType,
          record.itemDetail,
          record.code,
          record.memo,
        ].join(' ').toLowerCase();
        return !query || text.includes(query);
      });

      return filtered.sort((a, b) => {
        if (sortSelect.value === 'low-stock') {
          return Number(a.stockCount || 0) - Number(b.stockCount || 0);
        }
        if (sortSelect.value === 'billing') {
          return getBilling(b) - getBilling(a);
        }
        if (sortSelect.value === 'updated') {
          return new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt);
        }
        return a.residentName.localeCompare(b.residentName, 'ja');
      });
    }

    function renderRecords() {
      recordList.innerHTML = '';
      const visibleRecords = getVisibleRecords();

      if (visibleRecords.length === 0) {
        recordList.innerHTML = '<p class="empty">表示する登録がありません。</p>';
        updateSummary();
        return;
      }

      visibleRecords.forEach((record) => {
        const card = document.createElement('article');
        card.className = 'record-card';
        card.dataset.id = record.id;
        card.innerHTML = `
          <div class="record-header">
            <div>
              <h3>${escapeHtml(record.residentName)}</h3>
              <p class="record-meta">${escapeHtml(record.itemType)} ${escapeHtml(record.itemDetail)}<br>管理コード: ${escapeHtml(record.code)}</p>
            </div>
            <div class="record-meta">更新: ${new Date(record.updatedAt || record.createdAt).toLocaleString('ja-JP')}</div>
          </div>
          <div class="stats-row">
            <div class="stat"><strong>${Number(record.stockCount || 0)}</strong><span>現在庫</span></div>
            <div class="stat"><strong>${Number(record.usedCount || 0)}</strong><span>今月使用</span></div>
            <div class="stat"><strong>${yen(record.unitPrice)}</strong><span>1枚単価</span></div>
            <div class="stat"><strong>${yen(getBilling(record))}</strong><span>請求予定</span></div>
          </div>
          ${record.memo ? `<p class="record-meta">メモ: ${escapeHtml(record.memo)}</p>` : ''}
          <div class="record-actions">
            <button type="button" data-action="use" data-id="${record.id}">使用 +1</button>
            <button type="button" data-action="undo-use" data-id="${record.id}" class="secondary-button">使用取消</button>
            <button type="button" data-action="restock-one" data-id="${record.id}" class="secondary-button">入庫 +1</button>
            <button type="button" data-action="restock-pack" data-id="${record.id}" class="secondary-button">入庫 +10</button>
            <button type="button" data-action="toggle-qr" data-id="${record.id}" class="secondary-button">QR表示</button>
            <button type="button" data-action="delete" data-id="${record.id}" class="danger-button">削除</button>
          </div>
          <div class="qr-section" hidden>
            <div class="qr-box">
              <canvas class="qr-canvas" width="180" height="180"></canvas>
            </div>
            <p class="record-meta">管理コード: ${escapeHtml(record.code)}</p>
          </div>
        `;
        card.querySelector('.record-actions').addEventListener('click', handleRecordAction);
        recordList.appendChild(card);
      });

      updateSummary();
    }

    function touch(record) {
      record.updatedAt = new Date().toISOString();
    }

    function handleRecordAction(event) {
      const button = event.target.closest('button');
      if (!button) return;

      const record = records.find((entry) => entry.id === button.dataset.id);
      if (!record) return;

      if (button.dataset.action === 'use') {
        if (Number(record.stockCount || 0) <= 0) {
          setStatus('在庫が0のため、使用登録できません。先に入庫してください。', 'warning');
          return;
        }
        record.stockCount = Number(record.stockCount || 0) - 1;
        record.usedCount = Number(record.usedCount || 0) + 1;
        touch(record);
        setStatus(`${record.residentName}さんの使用を1枚登録しました。`, 'success');
      }

      if (button.dataset.action === 'undo-use') {
        if (Number(record.usedCount || 0) <= 0) {
          setStatus('取り消せる使用枚数がありません。', 'warning');
          return;
        }
        record.usedCount = Number(record.usedCount || 0) - 1;
        record.stockCount = Number(record.stockCount || 0) + 1;
        touch(record);
        setStatus('直近分として1枚戻しました。', 'success');
      }

      if (button.dataset.action === 'restock-one') {
        record.stockCount = Number(record.stockCount || 0) + 1;
        touch(record);
        setStatus('在庫を1枚追加しました。', 'success');
      }

      if (button.dataset.action === 'restock-pack') {
        record.stockCount = Number(record.stockCount || 0) + 10;
        touch(record);
        setStatus('在庫を10枚追加しました。', 'success');
      }

      if (button.dataset.action === 'delete') {
        if (!confirm(`${record.residentName}さんの「${record.itemType}」を削除しますか？`)) return;
        records = records.filter((entry) => entry.id !== record.id);
        setStatus('登録を削除しました。', 'success');
      }

      if (button.dataset.action === 'toggle-qr') {
        const card = button.closest('.record-card');
        toggleQRCode(card, record);
        return;
      }

      saveRecords();
      renderRecords();
    }

    function handleFormSubmit(event) {
      event.preventDefault();

      const residentName = residentNameInput.value.trim();
      const stockCount = Number(stockCountInput.value);
      const usedCount = Number(usedCountInput.value);
      const unitPrice = Number(unitPriceInput.value || 0);
      let code = itemCodeInput.value.trim();

      if (!residentName || Number.isNaN(stockCount) || Number.isNaN(usedCount) || Number.isNaN(unitPrice)) {
        setStatus('利用者名・枚数・単価を確認してください。', 'warning');
        return;
      }

      if (!code) {
        code = generateCode();
      }

      if (records.some((record) => record.code === code)) {
        setStatus('同じ管理コードがすでに登録されています。別のコードにしてください。', 'warning');
        return;
      }

      const now = new Date().toISOString();
      records.unshift({
        id: `record-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        residentName,
        itemType: itemTypeInput.value,
        itemDetail: itemDetailInput.value.trim(),
        code,
        stockCount,
        usedCount,
        unitPrice,
        memo: memoInput.value.trim(),
        createdAt: now,
        updatedAt: now,
      });

      saveRecords();
      renderRecords();
      recordForm.reset();
      stockCountInput.value = 0;
      usedCountInput.value = 0;
      unitPriceInput.value = 0;
      setStatus('登録しました。', 'success');
    }

    function handleGenerateCode() {
      itemCodeInput.value = generateCode();
    }

    function generateQRCode(canvas, text) {
      if (typeof QRCode === 'undefined' || !canvas) return;
      QRCode.toCanvas(canvas, text, {
        width: 180,
        margin: 1,
        color: { dark: '#111111', light: '#ffffff' },
      });
    }

    function toggleQRCode(card, record) {
      const qrSection = card.querySelector('.qr-section');
      if (!qrSection) return;

      qrSection.hidden = !qrSection.hidden;
      if (!qrSection.hidden) {
        const canvas = qrSection.querySelector('.qr-canvas');
        if (canvas && canvas.dataset.generated !== 'true') {
          generateQRCode(canvas, record.code);
          canvas.dataset.generated = 'true';
        }
      }
    }

    function ensureScanCanvas() {
      if (!scanCanvas) {
        scanCanvas = document.createElement('canvas');
        scanContext = scanCanvas.getContext('2d');
      }
    }

    function decodeWithJsQR() {
      if (!window.jsQR || video.readyState !== HTMLMediaElement.HAVE_ENOUGH_DATA) return null;
      ensureScanCanvas();
      const width = video.videoWidth;
      const height = video.videoHeight;
      if (!width || !height) return null;

      scanCanvas.width = width;
      scanCanvas.height = height;
      scanContext.drawImage(video, 0, 0, width, height);
      const imageData = scanContext.getImageData(0, 0, width, height);
      const result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
      return result ? result.data : null;
    }

    async function startScanner() {
      if (scanning) return;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('このブラウザはカメラに対応していません。', 'error');
        return;
      }

      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = currentStream;
        scanning = true;
        startScanButton.disabled = true;
        stopScanButton.disabled = false;
        setStatus('カメラを起動しました。管理コードを読み取ります。', 'success');
        requestAnimationFrame(scanLoop);
      } catch (error) {
        setStatus('カメラの起動に失敗しました。ブラウザのカメラ許可を確認してください。', 'error');
      }
    }

    function stopScanner() {
      scanning = false;
      if (currentStream) {
        currentStream.getTracks().forEach((track) => track.stop());
        currentStream = null;
      }
      video.srcObject = null;
      startScanButton.disabled = false;
      stopScanButton.disabled = true;
      setStatus('スキャンを停止しました。', 'info');
    }

    function scanLoop() {
      if (!scanning) return;
      const code = decodeWithJsQR();
      if (code && code !== lastScannedCode) {
        lastScannedCode = code;
        scanOutput.textContent = code;
        highlightRecord(code);
      }
      requestAnimationFrame(scanLoop);
    }

    function highlightRecord(code) {
      const found = records.find((record) => record.code === code);
      document.querySelectorAll('.record-card').forEach((card) => card.classList.remove('found'));

      if (!found) {
        setStatus('該当する登録がありません。', 'warning');
        return;
      }

      searchInput.value = '';
      sortSelect.value = 'resident';
      renderRecords();
      const card = document.querySelector(`.record-card[data-id='${found.id}']`);
      if (card) {
        card.classList.add('found');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      setStatus(`${found.residentName}さんの${found.itemType}を表示しました。`, 'success');
    }

    function handleManualLookup() {
      const code = manualCodeInput.value.trim();
      if (!code) {
        setStatus('検索する管理コードを入力してください。', 'warning');
        return;
      }
      scanOutput.textContent = code;
      highlightRecord(code);
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      }
    }

    function setEventListeners() {
      recordForm.addEventListener('submit', handleFormSubmit);
      generateCodeButton.addEventListener('click', handleGenerateCode);
      searchInput.addEventListener('input', renderRecords);
      sortSelect.addEventListener('change', renderRecords);
      startScanButton.addEventListener('click', startScanner);
      stopScanButton.addEventListener('click', stopScanner);
      manualLookupButton.addEventListener('click', handleManualLookup);
      window.addEventListener('beforeunload', () => {
        if (currentStream) currentStream.getTracks().forEach((track) => track.stop());
      });
    }

    function init() {
      loadRecords();
      renderRecords();
      setEventListeners();
      registerServiceWorker();
      setStatus('準備完了', 'info');
    }

    init();
  </script>
</body>
</html>
